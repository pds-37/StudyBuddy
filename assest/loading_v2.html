<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StudyBuddy — VEDA</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --ink:   #07080c;
  --gold:  #c9a84c;
  --gold2: #e2c47a;
  --gold3: #8a6a20;
  --pur:   #7b5ea7;
  --pur2:  #a480d4;
  --fg:    #dde0e8;
  --fg2:   #6b7385;
  --serif: 'Instrument Serif', Georgia, serif;
  --sans:  'DM Sans', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; width: 100%;
  background: var(--ink);
  overflow: hidden;
  font-family: var(--sans);
  -webkit-font-smoothing: antialiased;
}

/* ─── CANVAS LAYERS ─── */
#bg-canvas {
  position: fixed; inset: 0; z-index: 0;
}
#ring-canvas {
  position: fixed; inset: 0; z-index: 1;
  pointer-events: none;
}

/* ─── GRAIN ─── */
.grain {
  position: fixed; inset: 0; z-index: 2;
  opacity: 0.03;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.82' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px;
  pointer-events: none;
}

/* ─── SHELL ─── */
.shell {
  position: fixed; inset: 0; z-index: 3;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* ─── ORB SYSTEM ─── */
.orb-system {
  position: relative;
  width: 220px; height: 220px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 44px;
}

/* Outermost halo — very faint */
.orb-halo {
  position: absolute; inset: -30px;
  border-radius: 50%;
  background: radial-gradient(circle,
    rgba(123,94,167,0.07) 0%,
    rgba(201,168,76,0.04) 40%,
    transparent 70%
  );
  animation: haloPulse 4s ease-in-out infinite;
}
@keyframes haloPulse {
  0%,100% { transform: scale(1);   opacity: 0.7; }
  50%      { transform: scale(1.1); opacity: 1;   }
}

/* SVG rings wrapper — drawn on ring-canvas, but we keep a DOM version too */
.rings-wrap {
  position: absolute; inset: 0;
  border-radius: 50%;
}

/* Core orb */
.orb-core {
  position: relative; z-index: 2;
  width: 110px; height: 110px;
  border-radius: 50%;
  background:
    radial-gradient(circle at 38% 32%,
      rgba(180,148,230,0.75) 0%,
      rgba(123,94,167,0.55) 28%,
      rgba(40,30,70,0.95)   60%,
      rgba(12,10,22,1)      100%
    );
  border: 1px solid rgba(180,148,230,0.2);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  box-shadow:
    0 0 40px rgba(123,94,167,0.3),
    0 0 80px rgba(123,94,167,0.12),
    0 0 120px rgba(123,94,167,0.05),
    inset 0 1px 0 rgba(255,255,255,0.1);
  animation: coreBreath 3.5s ease-in-out infinite;
}
@keyframes coreBreath {
  0%,100% { box-shadow: 0 0 40px rgba(123,94,167,0.3),  0 0 80px rgba(123,94,167,0.12); }
  50%      { box-shadow: 0 0 60px rgba(123,94,167,0.45), 0 0 100px rgba(123,94,167,0.2); }
}

/* Inner shimmer sweep */
.orb-core::before {
  content: '';
  position: absolute; inset: -20%;
  width: 60%; height: 140%;
  background: linear-gradient(
    135deg,
    transparent 30%,
    rgba(255,255,255,0.08) 50%,
    transparent 70%
  );
  transform: rotate(-30deg) translateX(-100%);
  animation: shimmerSweep 3.2s ease-in-out infinite;
}
@keyframes shimmerSweep {
  0%   { transform: rotate(-30deg) translateX(-100%); }
  55%, 100% { transform: rotate(-30deg) translateX(300%); }
}

.orb-letter {
  font-family: var(--serif);
  font-style: italic;
  font-size: 38px;
  color: rgba(218,200,255,0.92);
  text-shadow: 0 0 24px rgba(180,148,230,0.7);
  position: relative; z-index: 1;
  animation: letterFloat 3.5s ease-in-out infinite;
}
@keyframes letterFloat {
  0%,100% { transform: translateY(0px);  }
  50%      { transform: translateY(-3px); }
}

/* ─── BRAND TEXT ─── */
.brand {
  text-align: center;
  margin-bottom: 36px;
  animation: textFadeUp 1s 0.4s ease both;
}
.brand-name {
  font-family: var(--serif);
  font-size: 26px;
  color: var(--fg);
  letter-spacing: 0.01em;
  margin-bottom: 5px;
}
.brand-tag {
  font-size: 10.5px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--fg2);
}

/* ─── STATUS TEXT ─── */
.status-wrap {
  text-align: center;
  height: 44px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  margin-bottom: 28px;
  animation: textFadeUp 1s 0.6s ease both;
}
.status-main {
  font-family: var(--serif);
  font-style: italic;
  font-size: 17px;
  color: var(--fg);
  margin-bottom: 4px;
  transition: opacity 0.4s, transform 0.4s;
}
.status-sub {
  font-size: 12px;
  color: var(--fg2);
  letter-spacing: 0.04em;
  transition: opacity 0.4s;
}

/* ─── ARC PROGRESS ─── */
.arc-wrap {
  position: relative;
  width: 56px; height: 56px;
  animation: textFadeUp 1s 0.7s ease both;
}
.arc-svg { display: block; }
.arc-bg-circle {
  fill: none;
  stroke: rgba(255,255,255,0.05);
  stroke-width: 2;
}
.arc-progress {
  fill: none;
  stroke: url(#arcGrad);
  stroke-width: 2;
  stroke-linecap: round;
  stroke-dasharray: 138;
  stroke-dashoffset: 138;
  transition: stroke-dashoffset 0.6s cubic-bezier(0.16,1,0.3,1);
  transform: rotate(-90deg);
  transform-origin: center;
}
.arc-pct {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 500;
  color: var(--gold);
  letter-spacing: 0.03em;
}

/* ─── FOOTER ─── */
.footer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 10;
  padding: 18px 40px;
  display: flex; align-items: center; justify-content: space-between;
  border-top: 1px solid rgba(255,255,255,0.04);
  animation: textFadeUp 1s 1s ease both;
}
.footer-txt {
  font-size: 10.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.12);
}
.footer-dots { display: flex; gap: 5px; align-items: center; }
.fdot {
  width: 3px; height: 3px; border-radius: 50%;
  background: var(--fg2);
  animation: dotBounce 1.4s ease-in-out infinite;
}
.fdot:nth-child(2){ animation-delay: 0.15s; }
.fdot:nth-child(3){ animation-delay: 0.30s; }
@keyframes dotBounce {
  0%,80%,100%{ transform: scale(1);   opacity:0.3; }
  40%        { transform: scale(1.6); opacity:1; }
}

@keyframes textFadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<canvas id="ring-canvas"></canvas>
<div class="grain"></div>

<div class="shell">

  <div class="orb-system">
    <div class="orb-halo"></div>
    <div class="rings-wrap" id="rings-wrap"></div>
    <div class="orb-core">
      <span class="orb-letter">V</span>
    </div>
  </div>

  <div class="brand">
    <div class="brand-name">StudyBuddy</div>
    <div class="brand-tag">VEDA · AI Mentor</div>
  </div>

  <div class="status-wrap">
    <div class="status-main" id="st-main">Waking up VEDA</div>
    <div class="status-sub"  id="st-sub">Your AI mentor is initialising…</div>
  </div>

  <div class="arc-wrap">
    <svg class="arc-svg" width="56" height="56" viewBox="0 0 56 56">
      <defs>
        <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%"   stop-color="#8a6a20"/>
          <stop offset="50%"  stop-color="#c9a84c"/>
          <stop offset="100%" stop-color="#e2c47a"/>
        </linearGradient>
      </defs>
      <circle class="arc-bg-circle" cx="28" cy="28" r="22"/>
      <circle class="arc-progress"  cx="28" cy="28" r="22" id="arc-prog"/>
    </svg>
    <div class="arc-pct" id="arc-pct">0%</div>
  </div>

</div>

<div class="footer">
  <span class="footer-txt">StudyBuddy Career OS</span>
  <div class="footer-dots">
    <div class="fdot"></div><div class="fdot"></div><div class="fdot"></div>
  </div>
  <span class="footer-txt">Neural Bridge V1.0</span>
</div>

<script>
/* ══════════════════════════════════════════════
   BG CANVAS — nebula particles + gold sparks
══════════════════════════════════════════════ */
(function(){
  const c = document.getElementById('bg-canvas');
  const ctx = c.getContext('2d');
  let W, H;

  const DOTS = [];
  const SPARKS = [];

  function resize(){
    W = c.width  = window.innerWidth;
    H = c.height = window.innerHeight;
    buildDots();
  }

  function buildDots(){
    DOTS.length = 0;
    for(let i=0;i<70;i++){
      DOTS.push({
        x: Math.random()*W, y: Math.random()*H,
        vx:(Math.random()-.5)*.18, vy:(Math.random()-.5)*.18,
        r: Math.random()*.9+.2,
        a: Math.random()*.22+.04,
        gold: Math.random()>.6,
        phase: Math.random()*Math.PI*2,
        speed: Math.random()*.015+.008,
      });
    }
  }

  function spawnSpark(x,y){
    SPARKS.push({ x, y,
      vx:(Math.random()-.5)*1.2,
      vy:(Math.random()-.5)*1.2,
      life:1, decay: Math.random()*.03+.02,
      r: Math.random()*.9+.3,
    });
  }

  let t=0;
  function frame(){
    t += 0.012;
    ctx.clearRect(0,0,W,H);

    /* Central radial glow */
    const cx=W/2, cy=H/2;
    const g = ctx.createRadialGradient(cx,cy,0,cx,cy,Math.min(W,H)*.52);
    g.addColorStop(0,'rgba(123,94,167,0.055)');
    g.addColorStop(.4,'rgba(201,168,76,0.025)');
    g.addColorStop(1,'transparent');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,W,H);

    /* Connections */
    for(let i=0;i<DOTS.length;i++){
      for(let j=i+1;j<DOTS.length;j++){
        const dx=DOTS[i].x-DOTS[j].x, dy=DOTS[i].y-DOTS[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<120){
          const a=(1-d/120)*0.055;
          ctx.beginPath();
          ctx.moveTo(DOTS[i].x,DOTS[i].y);
          ctx.lineTo(DOTS[j].x,DOTS[j].y);
          ctx.strokeStyle = DOTS[i].gold
            ? `rgba(201,168,76,${a})`
            : `rgba(130,100,200,${a*.6})`;
          ctx.lineWidth=.4;
          ctx.stroke();
        }
      }
    }

    /* Dots */
    DOTS.forEach(p=>{
      const pulse = Math.sin(t*p.speed*60+p.phase)*.5+.5;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r*(1+pulse*.3),0,Math.PI*2);
      ctx.fillStyle = p.gold
        ? `rgba(201,168,76,${p.a*(0.7+pulse*.3)})`
        : `rgba(140,110,210,${p.a*.6*(0.7+pulse*.3)})`;
      ctx.fill();
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0)p.x=W; if(p.x>W)p.x=0;
      if(p.y<0)p.y=H; if(p.y>H)p.y=0;
    });

    /* Random gold sparks */
    if(Math.random()<.04){
      const a = Math.random()*Math.PI*2;
      const r = Math.random()*Math.min(W,H)*.38;
      spawnSpark(cx+Math.cos(a)*r, cy+Math.sin(a)*r);
    }

    /* Draw sparks */
    for(let i=SPARKS.length-1;i>=0;i--){
      const s=SPARKS[i];
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(226,196,122,${s.life*.6})`;
      ctx.fill();
      s.x+=s.vx; s.y+=s.vy; s.life-=s.decay;
      if(s.life<=0) SPARKS.splice(i,1);
    }

    requestAnimationFrame(frame);
  }

  window.addEventListener('resize',resize);
  resize();
  frame();
})();


/* ══════════════════════════════════════════════
   RING CANVAS — animated orbital rings around orb
══════════════════════════════════════════════ */
(function(){
  const c = document.getElementById('ring-canvas');
  const ctx = c.getContext('2d');
  let W, H;

  const RINGS = [
    { r:90,  speed:.004, tilt:.55, dashLen:0.28, color:'rgba(201,168,76,', baseA:.22, phase:0      },
    { r:118, speed:.0028,tilt:.35, dashLen:0.18, color:'rgba(180,148,230,', baseA:.14, phase:1.1   },
    { r:145, speed:.002, tilt:.65, dashLen:0.12, color:'rgba(201,168,76,', baseA:.10, phase:2.4   },
    { r:172, speed:.0015,tilt:.25, dashLen:0.08, color:'rgba(130,100,200,', baseA:.07, phase:0.7   },
  ];

  // Orbiting dots on each ring
  const ORBITERS = [
    { ringIdx:0, angle:0,   speed:.009,  r:3,  color:'rgba(226,196,122,', a:.95 },
    { ringIdx:0, angle:Math.PI, speed:.009, r:2, color:'rgba(226,196,122,',a:.6  },
    { ringIdx:1, angle:.8,  speed:.006,  r:2.5,color:'rgba(200,170,255,', a:.85 },
    { ringIdx:2, angle:2.3, speed:.004,  r:2,  color:'rgba(226,196,122,', a:.7  },
    { ringIdx:3, angle:4.1, speed:.003,  r:1.8,color:'rgba(180,148,230,', a:.6  },
  ];

  function resize(){
    W = c.width  = window.innerWidth;
    H = c.height = window.innerHeight;
  }

  let t = 0;
  function frame(){
    t += 0.016;
    ctx.clearRect(0,0,W,H);

    const cx = W/2, cy = H/2;

    RINGS.forEach((ring, ri) => {
      const angle = t * ring.speed * 100;

      ctx.save();
      ctx.translate(cx, cy);

      // Tilt the ellipse
      ctx.scale(1, ring.tilt);

      // Dashed arc effect
      const circ    = 2 * Math.PI * ring.r;
      const dashPx  = circ * ring.dashLen;
      const gapPx   = circ * (1 - ring.dashLen) / 2;

      ctx.setLineDash([dashPx, gapPx]);
      ctx.lineDashOffset = -angle * ring.r;

      // Gradient stroke
      const grad = ctx.createConicalGradient
        ? null
        : null;

      const pulse = Math.sin(t * 1.2 + ri) * .5 + .5;
      ctx.beginPath();
      ctx.arc(0, 0, ring.r, 0, Math.PI * 2);
      ctx.strokeStyle = ring.color + (ring.baseA * (0.6 + pulse * .4)) + ')';
      ctx.lineWidth = ri === 0 ? 1.2 : 0.8;
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    });

    // Orbiting glow dots
    ORBITERS.forEach(ob => {
      ob.angle += ob.speed;
      const ring = RINGS[ob.ringIdx];
      const x = cx + Math.cos(ob.angle) * ring.r;
      const y = cy + Math.sin(ob.angle) * ring.r * ring.tilt;

      // Glow halo
      const grd = ctx.createRadialGradient(x,y,0,x,y,ob.r*4);
      grd.addColorStop(0, ob.color + ob.a + ')');
      grd.addColorStop(1, ob.color + '0)');
      ctx.beginPath();
      ctx.arc(x,y,ob.r*4,0,Math.PI*2);
      ctx.fillStyle = grd;
      ctx.fill();

      // Core dot
      ctx.beginPath();
      ctx.arc(x,y,ob.r,0,Math.PI*2);
      ctx.fillStyle = ob.color + ob.a + ')';
      ctx.fill();
    });

    requestAnimationFrame(frame);
  }

  window.addEventListener('resize', resize);
  resize();
  frame();
})();


/* ══════════════════════════════════════════════
   LOADING SEQUENCE — arc progress + status text
══════════════════════════════════════════════ */
(function(){
  const arc     = document.getElementById('arc-prog');
  const pctEl   = document.getElementById('arc-pct');
  const mainEl  = document.getElementById('st-main');
  const subEl   = document.getElementById('st-sub');

  const CIRCUMFERENCE = 2 * Math.PI * 22; // ≈ 138.2

  const PHASES = [
    { pct:18,  main:'Waking up VEDA',        sub:'Connecting to servers…',          dur:5000  },
    { pct:42,  main:'Loading the brain',      sub:'Spinning up Llama 3…',            dur:10000 },
    { pct:68,  main:'Remembering you',        sub:'Loading your knowledge base…',    dur:7000  },
    { pct:88,  main:'Almost there',           sub:'Personalising your experience…',  dur:5000  },
    { pct:100, main:'VEDA is ready',          sub:'Opening your dashboard…',         dur:1800  },
  ];

  let current = 0;
  let displayed = 0;

  function setArc(pct){
    const offset = CIRCUMFERENCE - (pct / 100) * CIRCUMFERENCE;
    arc.style.strokeDashoffset = offset;
  }

  function animatePct(from, to, dur){
    const start = performance.now();
    return new Promise(res=>{
      function step(now){
        const t = Math.min((now-start)/dur, 1);
        const ease = 1 - Math.pow(1-t, 3);
        const val = Math.round(from + (to-from)*ease);
        if(val !== displayed){
          displayed = val;
          pctEl.textContent = val+'%';
          setArc(val);
        }
        if(t < 1) requestAnimationFrame(step);
        else res();
      }
      requestAnimationFrame(step);
    });
  }

  function fadeText(mainTxt, subTxt){
    mainEl.style.opacity = '0';
    mainEl.style.transform = 'translateY(6px)';
    subEl.style.opacity  = '0';
    return new Promise(res=>{
      setTimeout(()=>{
        mainEl.textContent = mainTxt;
        subEl.textContent  = subTxt;
        mainEl.style.transition = 'opacity .4s, transform .4s';
        subEl.style.transition  = 'opacity .4s';
        mainEl.style.opacity = '1';
        mainEl.style.transform = 'translateY(0)';
        subEl.style.opacity  = '1';
        setTimeout(res, 400);
      }, 260);
    });
  }

  async function delay(ms){ return new Promise(r=>setTimeout(r,ms)); }

  async function run(){
    await delay(700);
    let prevPct = 0;
    for(const phase of PHASES){
      await Promise.all([
        fadeText(phase.main, phase.sub),
        animatePct(prevPct, phase.pct, phase.dur),
      ]);
      prevPct = phase.pct;
      await delay(300);
    }
    // Final flash out
    await delay(400);
    document.querySelector('.shell').style.transition = 'opacity .6s';
    document.querySelector('.shell').style.opacity = '0';
  }

  run();
})();
</script>
</body>
</html>
