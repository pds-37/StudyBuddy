# yaml-language-server: $schema=https://render.com/schema/render.yaml.json
services:
  - type: web
    name: studybuddy-api
    runtime: node
    plan: free
    autoDeployTrigger: commit
    buildCommand: npm install && npm run build --workspace @studybuddy/shared && npm run build --workspace @studybuddy/api
    startCommand: npm run start --workspace @studybuddy/api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: LOG_LEVEL
        value: tiny
      - key: CLIENT_ORIGIN
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: studybuddy_career_copilot
      - key: ATLAS_VECTOR_INDEX_NAME
        value: skill_vector_index
      - key: ATLAS_VECTOR_PATH
        value: embedding
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_GEMINI_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: HUGGINGFACE_EMBEDDING_MODEL
        value: sentence-transformers/all-MiniLM-L6-v2
      - key: HUGGINGFACE_NER_MODEL
        value: dslim/bert-base-NER
